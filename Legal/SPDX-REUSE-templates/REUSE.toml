version = 1

# Cover the human-facing LICENSE and NOTICE files, which live outside LICENSES/.
[[annotations]]
path = ["LICENSE", "NOTICE"]
precedence = "closest"
SPDX-FileCopyrightText = "<YEAR> European Centre for Medium-Range Weather Forecasts (ECMWF)"
SPDX-License-Identifier = "Apache-2.0"

# Cover files that cannot carry a comment (adapt paths per repository).
[[annotations]]
path = ["docs/_static/**", "tests/data/**"]
precedence = "closest"
SPDX-FileCopyrightText = "<YEAR> European Centre for Medium-Range Weather Forecasts (ECMWF)"
SPDX-License-Identifier = "Apache-2.0"
